<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div class="modal fade" id="creditCardRegistrationModal" tabindex="-1" role="dialog"
     aria-labelledby="creditCardRegistrationModalTitle">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
                <h4 class="modal-title" id="creditCardRegistrationModalTitle">Add new credit card</h4>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger hidden" id="creditCardRegistrationError" role="alert">
                    Invalid credit card. Check the information and try again.
                </div>
                <form id="creditCardRegistrationForm"
                      th:attr="data-token-url=${@ecommerceProperties.getPaymentProviderCreditCardTokenUrl()},
                               data-public-token=${@ecommerceProperties.getPaymentProviderPublicKey()}">
                    <div class="form-group">
                        <input class="input" type="text" name="holderName" placeholder="Name">
                    </div>
                    <div class="form-group">
                        <input class="input" type="text" name="holderDocument" placeholder="Document">
                    </div>
                    <div class="form-group">
                        <input class="input" type="text" name="cardNumber" placeholder="Card number">
                    </div>
                    <div class="form-group">
                        <input class="input" type="number" min="1" max="12" name="expMonth" placeholder="Expiration month">
                    </div>
                    <div class="form-group">
                        <input class="input" type="number" min="2026" max="2100" name="expYear" placeholder="Expiration year">
                    </div>
                    <div class="form-group">
                        <input class="input" type="text" name="CVV" placeholder="CVV">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="secondary-btn btn btn-default" data-dismiss="modal">Cancel</button>
                <button type="button" class="primary-btn order-submit" id="creditCardRegistrationSubmit">
                    Save card
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>

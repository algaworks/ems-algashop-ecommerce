<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div class="container px-3 my-5 clearfix">
    <!-- Shopping cart table -->
    <div th:with="shoppingCart=${@menuService.loadShoppingCart()}" th:object="${shoppingCart}">
        <div class="px-4 px-lg-0">
            <div class="pb-5">
                <div class="container">
                    <div class="row">
                        <div class="col-lg-12 p-5 bg-white rounded shadow-sm mb-5">

                            <div class="alert alert-success" role="alert" th:if="${removed}">
                                Product removed!
                                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>
                            <!-- Shopping cart table -->
                            <div class="table-responsive shopping-cart-item-table">
                                <table class="table">
                                    <thead>
                                    <tr>
                                        <th scope="col" class="border-0 bg-light">
                                            <div class="p-2 px-3 text-uppercase">Product</div>
                                        </th>
                                        <th scope="col" class="border-0 bg-light">
                                            <div class="py-2 text-uppercase">Price</div>
                                        </th>
                                        <th scope="col" class="border-0 bg-light">
                                            <div class="py-2 text-uppercase">Quantity</div>
                                        </th>
                                        <th scope="col" class="border-0 bg-light">
                                            <div class="py-2 text-uppercase">Remove</div>
                                        </th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="item: ${shoppingCart.items}">
                                        <th scope="row" class="border-0">
                                            <div class="p-2 shopping-cart-item-table-head">
                                                <img th:src="@{/img/no-picture.png}" decoding="async" width="70" class="img-fluid rounded shadow-sm">
                                                <div class="ml-3 d-inline-block align-middle">
                                                    <h5 class="mb-0">
                                                        <a th:href="|/products/${item.productId}|"
                                                           th:text="${item.name}" class="text-dark d-inline-block align-middle">PC</a>
                                                    </h5>
<!--                                                    <span class="text-muted font-weight-normal font-italic d-block">Category: Watches</span>-->
                                                </div>
                                            </div>
                                        </th>
                                        <td class="border-0 align-middle"><strong th:text="${#numbers.formatCurrency(item.price)}">$79,00</strong></td>
                                        <td class="border-0 align-middle"><strong th:text="${item.quantity}">3</strong></td>
                                        <td class="border-0 align-middle">
                                            <button class="text-dark js-on-click-remove-item" th:data-item-id="${item.id}"><i class="fa fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                            <!-- End -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="d-flex d-flex-end flex-wrap justify-content-between align-items-center pb-4">
            <div class="d-flex">
                <div class="text-right mt-4">
                    <label class="text-muted font-weight-normal m-0">Subtotal</label>
                    <div class="text-large"><strong th:text="${#numbers.formatCurrency(shoppingCart.totalAmount)}">$1.164,65</strong></div>
                </div>
            </div>
        </div>
        <div class="float-right">
            <a href="/products" class="btn btn-lg btn-default md-btn-flat mt-2 mr-2">Back to shopping</a>
            <a href="/checkout" type="button" class="btn btn-lg checkout-btn mt-2">Checkout <i class="fa fa-arrow-circle-right"></i></a>
        </div>
    </div>
</div>
</body>
</html>

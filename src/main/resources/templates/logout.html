<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:tiles="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>AlgaShop - Logout</title>

    <!-- Google font -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700" rel="stylesheet">

    <!-- Bootstrap -->
    <link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css"/>


    <!-- Custom stlylesheet -->
    <link type="text/css" rel="stylesheet" href="/css/style.css"/>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            color: white;
            background-color: #1E1F29;
        }
        h1, h2, h3, a {
            color: white;
        }
        .centralize {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            align-content: center;
            flex-wrap: nowrap;
            max-width: 420px;
            margin: auto;
            padding: 0 10px;
            padding-top: 10%;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="centralize">
    <div class="header-logo">
        <a href="#" class="logo">
            <img src="/img/logo.png" alt="">
        </a>
    </div>
    <form id="form" th:action="@{/logout}" method="post">
        <p>Aguarde você está sendo desconectado...</p>
    </form>
</div>
<script>
    function logout() {
      document.getElementById("form").submit();
    }
    const myTimeout = setTimeout(logout, 1000);
</script>
</body>
</html>

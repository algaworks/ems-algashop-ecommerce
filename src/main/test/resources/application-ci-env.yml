spring:
  datasource:
    url: ${DB_HOST:jdbc:postgresql://localhost:5432/ecommerce_test}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration,classpath:db/testdata}
    cleanDisabled: ${FLYWAY_CLEAN_DISABLE:false}
    url: ${FLYWAY_URL:jdbc:postgresql://localhost:5432/ecommerce_test}
    user: ${FLYWAY_USER:postgres}
    password: ${FLYWAY_PASSWORD:postgres}
eureka:
  client:
    registerWithEureka: false
    fetchRegistry: false
